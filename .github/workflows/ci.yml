name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Test
    runs-on: ubuntu-latest
    env:
      EVIDENCE_DIR: /tmp/ci-evidence/backend
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Prepare Evidence
        run: mkdir -p "${EVIDENCE_DIR}"

      - name: Go Test
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          go test ./... | tee "${EVIDENCE_DIR}/go-test.log"
          end_ts=$(date +%s)
          echo "go_test_seconds=$((end_ts - start_ts))" >> "${EVIDENCE_DIR}/durations.env"

      - name: Go Vet
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          go vet ./... | tee "${EVIDENCE_DIR}/go-vet.log"
          end_ts=$(date +%s)
          echo "go_vet_seconds=$((end_ts - start_ts))" >> "${EVIDENCE_DIR}/durations.env"

      - name: Upload Backend Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-backend
          path: /tmp/ci-evidence/backend

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    env:
      EVIDENCE_DIR: /tmp/ci-evidence/frontend
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Prepare Evidence
        run: mkdir -p "${EVIDENCE_DIR}"

      - name: Install Dependencies
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          npm ci 2>&1 | tee "${EVIDENCE_DIR}/npm-ci.log"
          end_ts=$(date +%s)
          echo "npm_ci_seconds=$((end_ts - start_ts))" >> "${EVIDENCE_DIR}/durations.env"

      - name: Build
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          npm run build 2>&1 | tee "${EVIDENCE_DIR}/npm-build.log"
          end_ts=$(date +%s)
          echo "npm_build_seconds=$((end_ts - start_ts))" >> "${EVIDENCE_DIR}/durations.env"

      - name: Upload Frontend Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-frontend
          path: /tmp/ci-evidence/frontend

  smoke:
    name: API Smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      EVIDENCE_DIR: /tmp/ci-evidence/smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Evidence
        run: mkdir -p "${EVIDENCE_DIR}"

      - name: Start Stack
        run: |
          set -euo pipefail
          cp .env.example .env
          attempt=1
          max_attempts=2
          until docker compose up -d --build api web sublink 2>&1 | tee "${EVIDENCE_DIR}/docker-compose-up-attempt-${attempt}.log"; do
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              exit 1
            fi
            docker compose down -v --remove-orphans || true
            attempt=$((attempt + 1))
            sleep 5
          done
          echo "docker_compose_up_attempts=${attempt}" > "${EVIDENCE_DIR}/smoke.meta"

      - name: Smoke Check
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:18080/healthz >"${EVIDENCE_DIR}/healthz.json"; then
              break
            fi
            sleep 2
          done
          grep -q '"status":"ok"' "${EVIDENCE_DIR}/healthz.json"

          login_code=$(curl -sS -o "${EVIDENCE_DIR}/login.json" -w '%{http_code}' \
            -X POST http://127.0.0.1:18080/api/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}')
          test "${login_code}" = "200"
          grep -q '"token"' "${EVIDENCE_DIR}/login.json"
          echo "login_code=${login_code}" >> "${EVIDENCE_DIR}/smoke.meta"

          curl -fsS http://127.0.0.1:18080/metrics >"${EVIDENCE_DIR}/metrics.txt"
          grep -q '^subadmin_http_requests_total' "${EVIDENCE_DIR}/metrics.txt"

          : > "${EVIDENCE_DIR}/output-statuses.txt"
          for endpoint in clash singbox; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:18080/${endpoint}")
            echo "${endpoint}=${code}" >> "${EVIDENCE_DIR}/output-statuses.txt"
            case "${code}" in
              200|304|502) ;;
              *)
                echo "unexpected status for /${endpoint}: ${code}"
                exit 1
                ;;
            esac
          done
          end_ts=$(date +%s)
          echo "smoke_seconds=$((end_ts - start_ts))" >> "${EVIDENCE_DIR}/smoke.meta"

      - name: Upload Smoke Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-smoke
          path: /tmp/ci-evidence/smoke

      - name: Shutdown Stack
        if: always()
        run: docker compose down -v --remove-orphans
